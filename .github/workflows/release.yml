name: Release

# Triggered by pushes to main. Two phases:
#
#  Bootstrap (one-time, while no @gramota/* packages exist on npm yet):
#    Set INITIAL_PUBLISH=1 in the repo (via a vars/inputs gate) — runs the
#    `Bootstrap publish` step that does a direct `pnpm publish -r`.
#
#  Steady state:
#    Uses changesets/action — opens "Version Packages" PRs on changeset
#    files, publishes when those PRs merge.
#
# Requires repo secret NPM_TOKEN with publish permission on the @gramota scope.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Run direct pnpm publish (bypasses changesets — for first release)"
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write  # needed for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          # No registry-url here — we write our own .npmrc below to avoid
          # the NODE_AUTH_TOKEN vs NPM_TOKEN env-var dance.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-main-
            turbo-${{ runner.os }}-

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > .npmrc
          echo "registry=https://registry.npmjs.org/" >> .npmrc
          # Sanity check — fails the step if token isn't valid
          npm whoami
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Bootstrap path: per-package `npm publish` loop, used for the first
      # publish before any @gramota/* packages exist on npm. Bypasses
      # pnpm publish -r which treats unknown packages (404 on `npm view`)
      # as "skip" rather than "publish new". Triggered by workflow_dispatch
      # with bootstrap=true.
      - name: Bootstrap publish (per-package loop)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.bootstrap }}
        run: |
          set -e
          for pkg_json in packages/*/package.json; do
            dir=$(dirname "$pkg_json")
            name=$(jq -r '.name' "$pkg_json")
            is_private=$(jq -r '.private // false' "$pkg_json")
            if [ "$is_private" = "true" ]; then
              echo "skip private: $name"
              continue
            fi
            echo "publish: $name"
            (cd "$dir" && npm publish --access public --provenance)
          done
          echo "Bootstrap publish complete"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # Steady-state path: changesets/action handles versioning + publish
      # via "Version Packages" PRs. Skipped during bootstrap.
      - name: Create Release Pull Request or Publish
        id: changesets
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.bootstrap }}
        uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          publish: pnpm exec changeset publish
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
