name: Release

# Triggered by pushes to main. Two modes:
#  1. There are pending changesets in .changeset/*.md
#     → opens or updates a "Version Packages" PR that bumps versions and updates CHANGELOGs.
#  2. The "Version Packages" PR was just merged (no remaining changesets, but versions are bumped)
#     → publishes every changed package to npm.
#
# Requires repo secret NPM_TOKEN with publish permission on the @gramota scope.

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write  # needed for npm provenance attestations

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # changesets needs full history to compute changed packages.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-main-
            turbo-${{ runner.os }}-

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Configure npm auth
        run: |
          # Write to $HOME/.npmrc so npm picks up the token regardless of
          # cwd (changesets cd's into each package directory).
          echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > $HOME/.npmrc
          echo "registry=https://registry.npmjs.org/" >> $HOME/.npmrc
          npm whoami
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # `version` runs `changeset version` to bump versions in the Version PR.
          version: pnpm exec changeset version
          # `publish` runs `changeset publish` after the Version PR merges.
          # `--access public` is set per-package via publishConfig, no flag needed.
          publish: pnpm exec changeset publish
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # changesets/action checks process.env.NPM_TOKEN to choose between
          # traditional auth and OIDC trusted publishing. Without it, it
          # falls back to OIDC, which silently no-ops for packages that
          # don't yet have a registered trusted publisher on npm.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
