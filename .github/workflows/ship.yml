name: Ship

# One-shot manual release. Bumps versions from pending changesets,
# commits the bumps to main, and publishes to npm — all in one run.
# No "Version Packages" PR step.
#
# Use this for the fast path. release.yml is the safer default (opens
# a PR for review before bumping).
#
# Trigger:
#   gh workflow run ship.yml --repo gramota-org/gramota
#   # or via the Actions tab in the GitHub UI: Ship → Run workflow

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — show what would publish but don't push"
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  ship:
    name: Bump + publish
    runs-on: ubuntu-latest

    permissions:
      contents: write    # to commit version bumps directly to main
      id-token: write    # for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT or GITHUB_TOKEN — but GITHUB_TOKEN can't push to a branch
          # protected by required-status-checks. If you've set branch
          # protection on main, replace this with a fine-grained PAT in a
          # secret called RELEASE_TOKEN.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-main-
            turbo-${{ runner.os }}-

      - name: Check for pending changesets
        id: check
        run: |
          # Count *.md files in .changeset/ excluding README.md
          count=$(find .changeset -maxdepth 1 -name '*.md' -not -name 'README.md' | wc -l | tr -d ' ')
          echo "count=$count" >> $GITHUB_OUTPUT
          if [ "$count" = "0" ]; then
            echo "::error::No pending changesets found in .changeset/. Run 'pnpm changeset' locally first."
            exit 1
          fi
          echo "Found $count changeset(s)"
          ls .changeset/*.md | grep -v README.md

      - name: Show what would publish
        run: pnpm exec changeset status --verbose

      - name: Bump versions
        run: |
          # changeset version bumps versions in package.json files,
          # updates per-package CHANGELOG.md, and consumes (deletes) the
          # changeset *.md files.
          pnpm exec changeset version
          pnpm install --lockfile-only

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Commit and push version bumps
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # If nothing changed (e.g. all changesets were no-ops), skip
          if git diff --quiet HEAD; then
            echo "No version changes to commit"
            exit 0
          fi
          git add -A
          git commit -m "chore: release packages" -m "Auto-generated by .github/workflows/ship.yml"
          git push origin HEAD:main

      - name: Configure npm auth
        if: ${{ !inputs.dry_run }}
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > $HOME/.npmrc
          echo "registry=https://registry.npmjs.org/" >> $HOME/.npmrc
          npm whoami
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: pnpm exec changeset publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "::notice::Dry run complete. Bumped versions in working tree but did NOT commit, push, or publish."
          echo "Changes that would be committed:"
          git diff --stat
